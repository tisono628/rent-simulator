<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フル変動賃料 計算シミュレーター</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-2xl space-y-6">

    <!-- Header -->
    <div class="text-center">
      <p class="text-xs text-gray-400 font-medium tracking-widest uppercase mb-1">JHAT</p>
      <h1 class="text-2xl font-bold text-gray-800">フル変動賃料 計算シミュレーター</h1>
    </div>

    <!-- Input Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 space-y-4">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider">入力</h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <!-- NET売上 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            売上高（NET）<span class="text-gray-400 font-normal">　千円</span>
          </label>
          <div class="relative">
            <input
              id="net"
              type="number"
              min="0"
              step="1"
              placeholder="例：10,000"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 pr-16 text-right text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition"
              oninput="calculate()"
            />
            <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none">千円</span>
          </div>
          <p id="net-preview" class="text-xs text-gray-400 mt-1 text-right h-4"></p>
        </div>

        <!-- GOP -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            GOP<span class="text-gray-400 font-normal">　千円</span>
          </label>
          <div class="relative">
            <input
              id="gop"
              type="number"
              min="0"
              step="1"
              placeholder="例：3,000"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 pr-16 text-right text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition"
              oninput="calculate()"
            />
            <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none">千円</span>
          </div>
          <p id="gop-preview" class="text-xs text-gray-400 mt-1 text-right h-4"></p>
        </div>
      </div>

      <!-- Rate Inputs -->
      <div class="border-t border-gray-100 pt-4">
        <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">料率設定</h3>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              <span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-blue-100 text-blue-700 text-xs font-bold mr-1">①</span>
              基本料率
            </label>
            <div class="relative">
              <input
                id="rate1"
                type="number"
                min="0"
                max="100"
                step="0.1"
                value="6"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 pr-10 text-right text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition"
                oninput="calculate()"
              />
              <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none">%</span>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              <span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-blue-100 text-blue-700 text-xs font-bold mr-1">②</span>
              変動料率
            </label>
            <div class="relative">
              <input
                id="rate2"
                type="number"
                min="0"
                max="100"
                step="0.1"
                value="7.4"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 pr-10 text-right text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition"
                oninput="calculate()"
              />
              <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none">%</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Result Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 space-y-4">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider">計算結果</h2>

      <!-- Calculation Steps -->
      <div class="space-y-2">

        <div class="flex items-center justify-between py-2.5 border-b border-gray-100">
          <span class="text-sm text-gray-600">GROSS売上高　<span class="text-gray-400 text-xs">NET × 1.1</span></span>
          <span id="r-gross" class="text-sm font-semibold text-gray-800">—</span>
        </div>

        <div class="flex items-center justify-between py-2.5 border-b border-gray-100">
          <span class="text-sm text-gray-600">
            <span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-blue-100 text-blue-700 text-xs font-bold mr-1">①</span>
            基本料　<span class="text-gray-400 text-xs">GROSS × 6%</span>
          </span>
          <span id="r-fee1" class="text-sm font-semibold text-blue-700">—</span>
        </div>

        <div class="flex items-center justify-between py-2.5 border-b border-gray-100">
          <span class="text-sm text-gray-600">
            <span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-blue-100 text-blue-700 text-xs font-bold mr-1">②</span>
            変動料　<span class="text-gray-400 text-xs">(GOP − ①) × 7.4%</span>
          </span>
          <span id="r-fee2" class="text-sm font-semibold text-blue-700">—</span>
        </div>

        <div class="flex items-center justify-between py-2.5 border-b border-gray-100">
          <span class="text-sm text-gray-600">GOP率　<span class="text-gray-400 text-xs">GOP ÷ GROSS</span></span>
          <span id="r-gop-rate" class="text-sm font-semibold text-gray-800">—</span>
        </div>

        <div class="flex items-center justify-between py-2.5 border-b border-gray-100">
          <span class="text-sm text-gray-600">JHAT取り分　<span class="text-gray-400 text-xs">① + ②</span></span>
          <span id="r-jhat" class="text-sm font-semibold text-indigo-600">—</span>
        </div>

      </div>

      <!-- Rent Highlight -->
      <div id="rent-box" class="rounded-xl p-4 bg-gray-50 border border-gray-200 flex items-center justify-between transition-all duration-300">
        <div>
          <p class="text-xs text-gray-500 mb-0.5">賃料　<span class="text-gray-400">GOP − ① − ②</span></p>
          <p class="text-xs text-gray-400">（マイナスの場合は 0 千円）</p>
        </div>
        <span id="r-rent" class="text-2xl font-bold text-gray-400">—</span>
      </div>
    </div>

    <p class="text-center text-xs text-gray-300">© JHAT</p>
  </div>

  <script>
    // 千円表示：整数、カンマ区切り
    function fmt(sen) {
      return Math.round(sen).toLocaleString('ja-JP') + ' 千円';
    }

    function calculate() {
      const netSen = parseFloat(document.getElementById('net').value);
      const gopSen = parseFloat(document.getElementById('gop').value);
      const r1 = parseFloat(document.getElementById('rate1').value);
      const r2 = parseFloat(document.getElementById('rate2').value);

      // Preview: 円換算を小さく表示
      const netPreview = document.getElementById('net-preview');
      const gopPreview = document.getElementById('gop-preview');
      netPreview.textContent = (!isNaN(netSen) && netSen >= 0)
        ? '= ' + Math.round(netSen * 1000).toLocaleString('ja-JP') + ' 円'
        : '';
      gopPreview.textContent = (!isNaN(gopSen) && gopSen >= 0)
        ? '= ' + Math.round(gopSen * 1000).toLocaleString('ja-JP') + ' 円'
        : '';

      const hasNet  = !isNaN(netSen) && netSen >= 0;
      const hasGop  = !isNaN(gopSen) && gopSen >= 0;
      const hasR1   = !isNaN(r1) && r1 >= 0;
      const hasR2   = !isNaN(r2) && r2 >= 0;

      if (!hasNet || !hasGop || !hasR1 || !hasR2) {
        ['r-gross','r-fee1','r-fee2','r-gop-rate','r-jhat','r-rent'].forEach(id => {
          document.getElementById(id).textContent = '—';
        });
        const box = document.getElementById('rent-box');
        box.className = 'rounded-xl p-4 bg-gray-50 border border-gray-200 flex items-center justify-between transition-all duration-300';
        document.getElementById('r-rent').className = 'text-2xl font-bold text-gray-400';
        return;
      }

      // 内部計算はすべて千円単位
      const gross   = netSen * 1.1;
      const fee1    = gross * (r1 / 100);
      const fee2    = (gopSen - fee1) * (r2 / 100);
      const rentRaw = gopSen - fee1 - fee2;
      const rent    = Math.max(0, rentRaw);
      const jhat    = fee1 + fee2;
      const gopRate = (gopSen > 0) ? (rent / gopSen * 100) : 0;

      document.getElementById('r-gross').textContent    = fmt(gross);
      document.getElementById('r-fee1').textContent     = fmt(fee1) + `　<span class="text-xs text-gray-400 font-normal">(${r1}%)</span>`;
      document.getElementById('r-fee2').textContent     = '';
      document.getElementById('r-fee2').innerHTML       = fmt(fee2) + `　<span class="text-xs text-gray-400 font-normal">(${r2}%)</span>`;
      document.getElementById('r-gop-rate').textContent = gopRate.toFixed(1) + '%';
      document.getElementById('r-jhat').textContent     = fmt(jhat);

      // fee1も同様にinnerHTMLで
      document.getElementById('r-fee1').innerHTML = fmt(fee1) + `　<span class="text-xs text-gray-400 font-normal">(${r1}%)</span>`;

      const rentEl = document.getElementById('r-rent');
      const box    = document.getElementById('rent-box');

      if (rentRaw < 0) {
        rentEl.textContent = '0 千円';
        rentEl.className   = 'text-2xl font-bold text-red-500';
        box.className      = 'rounded-xl p-4 bg-red-50 border border-red-200 flex items-center justify-between transition-all duration-300';
      } else {
        rentEl.textContent = fmt(rent);
        rentEl.className   = 'text-2xl font-bold text-emerald-600';
        box.className      = 'rounded-xl p-4 bg-emerald-50 border border-emerald-200 flex items-center justify-between transition-all duration-300';
      }
    }
  </script>
</body>
</html>
